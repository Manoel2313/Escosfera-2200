<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Ecosfera 2200 – JUNIOR</title>
  <style>
    /* ===== RESET ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    body {
      background: #0b0e12;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #d0dcdc;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ===== CONTAINER ===== */
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== CANVAS ===== */
    #canvas {
      display: block;
      background: #10161c;
      width: 100%;
      flex: 1;
      image-rendering: pixelated;
      border-bottom: 2px solid #1e2e2a;
    }

    /* ===== HUD SUPERIOR ===== */
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 6px 14px;
      background: rgba(6, 12, 16, 0.78);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid rgba(70, 140, 120, 0.2);
      pointer-events: none;
      z-index: 10;
      font-size: 13px;
    }
    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      align-items: center;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .hud-item .label {
      font-size: 11px;
      color: #8aa8a8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .hud-item .value {
      font-weight: 600;
      min-width: 28px;
      text-align: right;
    }
    .hud-bar {
      width: 70px;
      height: 6px;
      background: #1a262a;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #1a2a2a;
    }
    .hud-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .fill-green { background: #4ac0a0; }
    .fill-red { background: #e05a5a; }
    .fill-blue { background: #5aa8e0; }
    .fill-yellow { background: #e0c04a; }
    .fill-cyan { background: #4ac8e0; }

    .badge-cycle {
      background: #1a2a2a;
      padding: 2px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 200, 0.1);
    }
    .badge-day { color: #f0d060; }
    .badge-night { color: #6090f0; }

    /* ===== BOTÕES DE AÇÃO (apenas noite) ===== */
    #night-actions {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      background: rgba(6, 12, 16, 0.7);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 16px;
      border: 1px solid rgba(70, 140, 120, 0.2);
      z-index: 10;
      pointer-events: auto;
      max-width: 90%;
    }
    .night-btn {
      background: #1a2a2a;
      border: 1px solid #2a4a3a;
      color: #b0d0c0;
      padding: 8px 18px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      pointer-events: auto;
      white-space: nowrap;
    }
    .night-btn:hover {
      background: #2a3a32;
      border-color: #4a8a6a;
      color: #d0f0e0;
    }
    .night-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .night-btn .cost {
      font-size: 11px;
      color: #8aaa8a;
      display: block;
      font-weight: 300;
    }

    /* ===== INVENTÁRIO (simples) ===== */
    #inventory {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      background: rgba(6, 12, 16, 0.6);
      backdrop-filter: blur(6px);
      padding: 6px 18px;
      border-radius: 30px;
      border: 1px solid rgba(70, 140, 120, 0.15);
      z-index: 10;
      font-size: 14px;
      pointer-events: none;
    }
    .inv-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .inv-item .icon { font-size: 18px; }
    .inv-item .count { font-weight: 700; color: #d0e8e0; min-width: 24px; text-align: center; }

    /* ===== TUTORIAL / MENSAGENS ===== */
    #tutorial {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, 50%);
      background: rgba(2, 8, 10, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(80, 200, 160, 0.2);
      border-radius: 16px;
      padding: 24px 32px;
      max-width: 420px;
      text-align: center;
      z-index: 20;
      pointer-events: none;
      transition: opacity 0.5s;
      box-shadow: 0 0 60px rgba(0, 30, 20, 0.3);
    }
    #tutorial.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #tutorial h3 {
      color: #80d0b0;
      font-weight: 400;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-size: 18px;
    }
    #tutorial p {
      color: #b0c8c0;
      font-size: 15px;
      line-height: 1.5;
    }
    #tutorial .sub {
      color: #7a9a8a;
      font-size: 13px;
      margin-top: 8px;
    }
    #tutorial .btn-tut {
      margin-top: 14px;
      background: #1a2a22;
      border: 1px solid #3a6a4a;
      color: #a0d0b0;
      padding: 8px 28px;
      border-radius: 30px;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
      pointer-events: auto;
      transition: 0.2s;
    }
    #tutorial .btn-tut:hover {
      background: #2a4a32;
      border-color: #60b080;
    }

    /* ===== GAME OVER / WIN ===== */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      z-index: 30;
    }
    #overlay.show {
      display: flex;
    }
    #overlay h1 {
      font-size: 40px;
      letter-spacing: 3px;
    }
    #overlay .sub {
      font-size: 18px;
      color: #a0b0a0;
      max-width: 400px;
      text-align: center;
    }
    #overlay .btn-restart {
      background: #1a2a22;
      border: 1px solid #3a6a4a;
      color: #a0d0b0;
      padding: 12px 36px;
      border-radius: 30px;
      font-family: inherit;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      pointer-events: auto;
      margin-top: 8px;
    }
    #overlay .btn-restart:hover {
      background: #2a4a32;
      border-color: #60b080;
    }
    .overlay-lose h1 { color: #e06060; }
    .overlay-win h1 { color: #60e0a0; }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 700px) {
      #hud { font-size: 11px; padding: 5px 10px; gap: 4px 8px; }
      .hud-bar { width: 44px; height: 5px; }
      #inventory { font-size: 12px; gap: 10px; padding: 4px 12px; bottom: 120px; }
      #night-actions { bottom: 60px; padding: 8px 12px; gap: 8px; }
      .night-btn { font-size: 12px; padding: 6px 12px; }
      #tutorial { max-width: 90%; padding: 18px 20px; }
      #tutorial h3 { font-size: 16px; }
      #tutorial p { font-size: 14px; }
    }
    @media (max-width: 480px) {
      .hud-item .label { font-size: 9px; }
      .hud-item .value { font-size: 11px; min-width: 20px; }
      .hud-bar { width: 32px; height: 4px; }
      #inventory { font-size: 10px; gap: 6px; padding: 2px 10px; }
      .inv-item .icon { font-size: 14px; }
      #night-actions .night-btn { font-size: 10px; padding: 4px 8px; }
    }
  </style>
</head>
<body>

  <div id="app">
    <canvas id="canvas"></canvas>

    <!-- ===== HUD ===== -->
    <div id="hud">
      <div class="hud-group">
        <div class="hud-item">
          <span class="label">❤️</span>
          <div class="hud-bar"><div class="fill fill-red" id="hpBar" style="width:100%"></div></div>
          <span class="value" id="hpText">100</span>
        </div>
        <div class="hud-item">
          <span class="label">💨 O₂</span>
          <div class="hud-bar"><div class="fill fill-blue" id="oxyBar" style="width:100%"></div></div>
          <span class="value" id="oxyText">100</span>
        </div>
        <div class="hud-item">
          <span class="label">⚡</span>
          <div class="hud-bar"><div class="fill fill-yellow" id="engBar" style="width:100%"></div></div>
          <span class="value" id="engText">100</span>
        </div>
        <div class="hud-item" style="margin-left:6px;">
          <span class="label">🏚️ O₂</span>
          <div class="hud-bar"><div class="fill fill-cyan" id="bunkerOxyBar" style="width:60%"></div></div>
          <span class="value" id="bunkerOxyText">60</span>
        </div>
        <div class="hud-item">
          <span class="label">🔋</span>
          <div class="hud-bar"><div class="fill fill-yellow" id="bunkerEngBar" style="width:40%"></div></div>
          <span class="value" id="bunkerEngText">40</span>
        </div>
      </div>
      <div class="hud-group">
        <div class="hud-item">
          <span class="badge-cycle badge-day" id="cycleBadge">☀️ DIA</span>
        </div>
        <div class="hud-item">
          <span class="label">⏱️</span>
          <span class="value" id="timerDisplay">0:00</span>
        </div>
        <div class="hud-item">
          <span class="label">🌱</span>
          <span class="value" id="plantCount">0</span>
        </div>
      </div>
    </div>

    <!-- ===== INVENTÁRIO ===== -->
    <div id="inventory">
      <div class="inv-item"><span class="icon">🔩</span><span class="count" id="invMetal">0</span></div>
      <div class="inv-item"><span class="icon">🧬</span><span class="count" id="invBio">0</span></div>
      <div class="inv-item"><span class="icon">⚙️</span><span class="count" id="invTech">0</span></div>
    </div>

    <!-- ===== AÇÕES NOTURNAS ===== -->
    <div id="night-actions">
      <button class="night-btn" id="btnPlant" disabled>
        🌱 Criar Planta
        <span class="cost">🧬10 + 🔩5</span>
      </button>
      <button class="night-btn" id="btnUpgrade" disabled>
        ⬆ Melhorar Eficiência
        <span class="cost">🧬15</span>
      </button>
      <button class="night-btn" id="btnResearch" disabled>
        🔬 Pesquisar Avanço
        <span class="cost">⚙️12</span>
      </button>
    </div>

    <!-- ===== TUTORIAL ===== -->
    <div id="tutorial">
      <h3>🌱 ECOSFERA 2200</h3>
      <p id="tutText">Bem-vindo! O planeta está morto. Você é o último sobrevivente.</p>
      <div class="sub" id="tutSub">Durante o DIA, explore a superfície e colete recursos.<br>Durante a NOITE, gerencie o bunker.</div>
      <button class="btn-tut" id="tutBtn">Entendi!</button>
    </div>

    <!-- ===== OVERLAY ===== -->
    <div id="overlay">
      <h1 id="overlayTitle">💀 COLAPSO</h1>
      <div class="sub" id="overlaySub">O bunker ficou sem oxigênio.</div>
      <button class="btn-restart" id="restartBtn">🔄 Recomeçar</button>
    </div>
  </div>

  <script>
    // ================================================================
    //  ECOSFERA 2200 – VERSÃO JUNIOR (simplificada e acessível)
    //  Objetivo: clareza, tutorial, poucos sistemas, progressão suave.
    // ================================================================

    // ---- CONSTANTES ----
    const WORLD_W = 2000;
    const WORLD_H = 1600;
    const PLAYER_RADIUS = 14;
    const RES_RADIUS = 10;
    const MUTANT_RADIUS = 16;
    const DAY_DURATION = 45;   // segundos
    const NIGHT_DURATION = 30;

    // ---- DOM ----
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const hpBar = document.getElementById('hpBar');
    const hpText = document.getElementById('hpText');
    const oxyBar = document.getElementById('oxyBar');
    const oxyText = document.getElementById('oxyText');
    const engBar = document.getElementById('engBar');
    const engText = document.getElementById('engText');
    const bunkerOxyBar = document.getElementById('bunkerOxyBar');
    const bunkerOxyText = document.getElementById('bunkerOxyText');
    const bunkerEngBar = document.getElementById('bunkerEngBar');
    const bunkerEngText = document.getElementById('bunkerEngText');
    const cycleBadge = document.getElementById('cycleBadge');
    const timerDisplay = document.getElementById('timerDisplay');
    const plantCount = document.getElementById('plantCount');

    const invMetal = document.getElementById('invMetal');
    const invBio = document.getElementById('invBio');
    const invTech = document.getElementById('invTech');

    const btnPlant = document.getElementById('btnPlant');
    const btnUpgrade = document.getElementById('btnUpgrade');
    const btnResearch = document.getElementById('btnResearch');

    const tutorialDiv = document.getElementById('tutorial');
    const tutText = document.getElementById('tutText');
    const tutSub = document.getElementById('tutSub');
    const tutBtn = document.getElementById('tutBtn');

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySub = document.getElementById('overlaySub');
    const restartBtn = document.getElementById('restartBtn');

    // ---- CANVAS RESIZE ----
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height - 2; // pequena margem
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ---- ESTADO DO JOGO ----
    const game = {
      isDay: true,
      cycleTime: 0,
      cycleCount: 0,

      player: {
        x: WORLD_W / 2,
        y: WORLD_H - 160,
        radius: PLAYER_RADIUS,
        health: 100,
        oxygen: 100,
        energy: 100,
        speed: 140,
        alive: true,
        invincible: 0,
        attackCooldown: 0,
      },

      bunker: {
        oxygen: 60,
        energy: 40,
        plants: 0,          // número de plantas ativas
        efficiency: 1.0,    // multiplicador de produção
        researchDone: false, // avanço tecnológico
        prodO2: 0,          // por segundo
        consEnergy: 0,
      },

      inventory: {
        metal: 0,
        biomass: 0,
        tech: 0,
      },

      resources: [],
      mutants: [],
      particles: [],

      tutorialStep: 0,      // 0 = inicio, 1 = dia, 2 = noite, 3 = fim
      gameOver: false,
      gameWin: false,
    };

    // ---- FUNÇÕES AUXILIARES ----
    function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

    function lerp(a, b, t) { return a + (b - a) * t; }

    // ---- INICIALIZAÇÃO ----
    function initWorld() {
      game.resources = [];
      game.mutants = [];
      game.particles = [];

      // Recursos iniciais (abundantes)
      for (let i = 0; i < 40; i++) {
        const type = ['metal', 'biomass', 'tech'][randInt(0, 2)];
        const x = rand(60, WORLD_W - 60);
        const y = rand(60, WORLD_H - 60);
        if (dist({ x, y }, { x: WORLD_W / 2, y: WORLD_H - 160 }) < 120) continue;
        game.resources.push({
          x, y, type,
          radius: RES_RADIUS,
          collected: false,
          respawnTimer: 0,
          value: randInt(1, 3),
        });
      }

      // Mutantes (poucos e simples)
      for (let i = 0; i < 5; i++) {
        spawnMutant();
      }

      // Plantas iniciais
      game.bunker.plants = 2;
      game.bunker.efficiency = 1.0;
      updateBunkerStats();
    }

    function spawnMutant() {
      const x = rand(80, WORLD_W - 80);
      const y = rand(80, WORLD_H - 200);
      if (dist({ x, y }, { x: WORLD_W / 2, y: WORLD_H - 160 }) < 150) return;
      game.mutants.push({
        x, y,
        radius: MUTANT_RADIUS,
        hp: 20,
        maxHp: 20,
        speed: 35 + rand(-5, 10),
        damage: 8,
        attackCooldown: 0,
        state: 'patrol',
        targetX: rand(80, WORLD_W - 80),
        targetY: rand(80, WORLD_H - 200),
        level: 1,
      });
    }

    // ---- BUNKER STATS ----
    function updateBunkerStats() {
      const n = game.bunker.plants;
      const eff = game.bunker.efficiency * (game.bunker.researchDone ? 1.4 : 1.0);
      game.bunker.prodO2 = n * eff * 0.12;
      game.bunker.consEnergy = n * 0.04 * (game.bunker.researchDone ? 0.7 : 1.0);
      plantCount.textContent = n;
      // Atualiza UI do bunker (já feito no loop)
    }

    // ---- TUTORIAL ----
    function showTutorial(step) {
      game.tutorialStep = step;
      tutorialDiv.classList.remove('hidden');
      if (step === 0) {
        tutText.textContent = '🌱 ECOSFERA 2200 – O planeta está morto, mas você pode restaurá-lo.';
        tutSub.innerHTML = 'Durante o <strong>DIA</strong> você explora a superfície.<br>Durante a <strong>NOITE</strong> você gerencia o bunker.';
        tutBtn.textContent = 'Entendi!';
      } else if (step === 1) {
        tutText.textContent = '☀️ DIA – Explore e colete recursos!';
        tutSub.innerHTML = 'Use <strong>WASD</strong> para andar, <strong>ESPACO</strong> para atacar mutantes.<br>Colete 🔩 Metal, 🧬 Biomassa e ⚙️ Tecnologia.';
        tutBtn.textContent = 'OK, vou coletar!';
      } else if (step === 2) {
        tutText.textContent = '🌙 NOITE – Gerencie o bunker!';
        tutSub.innerHTML = 'Use os botões abaixo para:<br>🌱 Criar planta (consome recursos)<br>⬆ Melhorar eficiência<br>🔬 Pesquisar avanço (desbloqueia melhorias)';
        tutBtn.textContent = 'Entendi!';
      } else if (step === 3) {
        tutText.textContent = '🎯 Seu objetivo: restaurar o planeta!';
        tutSub.innerHTML = 'Aumente a produção de O₂ do bunker até <strong>95%</strong> e pesquise o avanço.<br>O mundo reagirá às suas ações. Boa sorte!';
        tutBtn.textContent = 'Vamos lá!';
        // Esconde após clicar
        tutBtn.onclick = () => {
          tutorialDiv.classList.add('hidden');
          tutBtn.onclick = null;
        };
        return;
      }
      // Para steps 0,1,2 o botão avança
      tutBtn.onclick = () => {
        if (step === 0) showTutorial(1);
        else if (step === 1) showTutorial(2);
        else if (step === 2) showTutorial(3);
        else tutorialDiv.classList.add('hidden');
      };
    }

    // ---- GAME OVER / WIN ----
    function triggerGameOver(reason) {
      if (game.gameOver) return;
      game.gameOver = true;
      overlay.classList.add('show');
      overlay.className = 'overlay-lose show';
      overlayTitle.textContent = '💀 COLAPSO';
      overlaySub.textContent = reason || 'O bunker entrou em colapso.';
    }

    function triggerWin() {
      if (game.gameWin) return;
      game.gameWin = true;
      overlay.classList.add('show');
      overlay.className = 'overlay-win show';
      overlayTitle.textContent = '🌱 PLANETA RESTAURADO';
      overlaySub.textContent = 'A Terra respira novamente. Parabéns!';
    }

    function resetGame() {
      game.isDay = true;
      game.cycleTime = 0;
      game.cycleCount = 0;
      game.player.health = 100;
      game.player.oxygen = 100;
      game.player.energy = 100;
      game.player.alive = true;
      game.player.x = WORLD_W / 2;
      game.player.y = WORLD_H - 160;
      game.player.invincible = 0;
      game.bunker.oxygen = 60;
      game.bunker.energy = 40;
      game.bunker.plants = 2;
      game.bunker.efficiency = 1.0;
      game.bunker.researchDone = false;
      game.inventory.metal = 0;
      game.inventory.biomass = 0;
      game.inventory.tech = 0;
      game.gameOver = false;
      game.gameWin = false;
      overlay.classList.remove('show');
      overlay.className = '';
      tutorialDiv.classList.remove('hidden');
      initWorld();
      updateBunkerStats();
      updateInventoryUI();
      showTutorial(0);
      // Habilita botões noturnos (serão desabilitados no dia)
      btnPlant.disabled = true;
      btnUpgrade.disabled = true;
      btnResearch.disabled = true;
    }

    // ---- UI UPDATES ----
    function updateInventoryUI() {
      invMetal.textContent = game.inventory.metal;
      invBio.textContent = game.inventory.biomass;
      invTech.textContent = game.inventory.tech;
    }

    function updateCycleUI() {
      const total = game.isDay ? DAY_DURATION : NIGHT_DURATION;
      const remaining = Math.max(0, total - game.cycleTime);
      const mins = Math.floor(remaining / 60);
      const secs = Math.floor(remaining % 60);
      timerDisplay.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
      cycleBadge.textContent = game.isDay ? '☀️ DIA' : '🌙 NOITE';
      cycleBadge.className = 'badge-cycle ' + (game.isDay ? 'badge-day' : 'badge-night');
    }

    // ---- INPUT ----
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') e.preventDefault();
      if (e.key === 'Enter' && tutorialDiv.classList.contains('hidden') === false) {
        // Avançar tutorial com Enter
        if (tutBtn) tutBtn.click();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // ---- BOTÕES NOTURNOS ----
    btnPlant.addEventListener('click', () => {
      if (!game.isDay && game.inventory.biomass >= 10 && game.inventory.metal >= 5) {
        game.inventory.biomass -= 10;
        game.inventory.metal -= 5;
        game.bunker.plants += 1;
        updateBunkerStats();
        updateInventoryUI();
        // Efeito
        for (let i = 0; i < 8; i++) {
          game.particles.push({
            x: WORLD_W / 2 + rand(-40, 40),
            y: WORLD_H - 160 + rand(-30, 30),
            vx: rand(-30, 30),
            vy: rand(-40, 10),
            life: 0.8 + Math.random() * 0.6,
            maxLife: 1.4,
            color: '#60d090',
            size: rand(3, 7),
          });
        }
        // Mensagem
        showTutMessage('🌱 Nova planta criada! +O₂');
      } else {
        showTutMessage('❌ Recursos insuficientes: 🧬10 + 🔩5');
      }
    });

    btnUpgrade.addEventListener('click', () => {
      if (!game.isDay && game.inventory.biomass >= 15) {
        game.inventory.biomass -= 15;
        game.bunker.efficiency += 0.25;
        updateBunkerStats();
        updateInventoryUI();
        showTutMessage('⬆ Eficiência aumentada! ' + game.bunker.efficiency.toFixed(1) + '×');
      } else {
        showTutMessage('❌ Precisa de 🧬15 Biomassa');
      }
    });

    btnResearch.addEventListener('click', () => {
      if (!game.isDay && game.inventory.tech >= 12 && !game.bunker.researchDone) {
        game.inventory.tech -= 12;
        game.bunker.researchDone = true;
        updateBunkerStats();
        updateInventoryUI();
        showTutMessage('🔬 Pesquisa concluída! Produção +40%, consumo -30%');
        // Partículas
        for (let i = 0; i < 12; i++) {
          game.particles.push({
            x: WORLD_W / 2 + rand(-60, 60),
            y: WORLD_H - 160 + rand(-40, 40),
            vx: rand(-50, 50),
            vy: rand(-60, 20),
            life: 0.8 + Math.random() * 0.8,
            maxLife: 1.6,
            color: '#80d0f0',
            size: rand(4, 9),
          });
        }
      } else if (game.bunker.researchDone) {
        showTutMessage('🔬 Pesquisa já realizada!');
      } else {
        showTutMessage('❌ Precisa de ⚙️12 Tecnologia');
      }
    });

    // Mensagem temporária (substitui tutorial por 2s)
    let tutMessageTimeout = null;

    function showTutMessage(msg) {
      if (tutMessageTimeout) clearTimeout(tutMessageTimeout);
      const origText = tutText.textContent;
      const origSub = tutSub.innerHTML;
      tutText.textContent = msg;
      tutSub.innerHTML = '';
      tutorialDiv.classList.remove('hidden');
      tutMessageTimeout = setTimeout(() => {
        if (game.tutorialStep < 3) {
          // Reexibe o tutorial atual
          showTutorial(game.tutorialStep);
        } else {
          tutorialDiv.classList.add('hidden');
        }
        tutMessageTimeout = null;
      }, 2000);
    }

    // ---- LOOP PRINCIPAL ----
    function update(dt) {
      if (game.gameOver || game.gameWin) return;

      const p = game.player;

      // ===== CICLO =====
      game.cycleTime += dt;
      const total = game.isDay ? DAY_DURATION : NIGHT_DURATION;
      if (game.cycleTime >= total) {
        game.cycleTime = 0;
        game.isDay = !game.isDay;
        game.cycleCount++;
        // Transição
        if (game.isDay) {
          // Dia: restaurar um pouco de oxigênio e energia do jogador
          p.oxygen = Math.min(100, p.oxygen + 20);
          p.energy = Math.min(100, p.energy + 15);
          // Resspawn de recursos
          if (game.resources.filter(r => !r.collected).length < 25) {
            for (let i = 0; i < 6; i++) {
              const type = ['metal', 'biomass', 'tech'][randInt(0, 2)];
              const x = rand(60, WORLD_W - 60);
              const y = rand(60, WORLD_H - 60);
              if (dist({ x, y }, { x: WORLD_W / 2, y: WORLD_H - 160 }) < 120) continue;
              game.resources.push({ x, y, type, radius: RES_RADIUS, collected: false, respawnTimer: 0,
                value: randInt(1, 3) });
            }
          }
          // Tutorial se for primeiro dia
          if (game.cycleCount === 1 && game.tutorialStep < 2) {
            showTutorial(1);
          }
          // Habilita/desabilita botões
          btnPlant.disabled = true;
          btnUpgrade.disabled = true;
          btnResearch.disabled = true;
          showTutMessage('☀️ DIA – Explore e colete!');
        } else {
          // Noite: mutações simples
          for (const m of game.mutants) {
            if (Math.random() < 0.25) {
              m.hp += 4;
              m.maxHp += 4;
              m.damage += 1.5;
              m.speed *= 1.03;
            }
          }
          // Novos mutantes
          if (game.mutants.length < 8 + Math.floor(game.cycleCount / 2)) {
            if (Math.random() < 0.3) spawnMutant();
          }
          // Tutorial se for primeira noite
          if (game.cycleCount === 1 && game.tutorialStep < 2) {
            showTutorial(2);
          } else if (game.cycleCount === 2 && game.tutorialStep < 3) {
            showTutorial(3);
          }
          // Habilita botões
          btnPlant.disabled = false;
          btnUpgrade.disabled = false;
          btnResearch.disabled = game.bunker.researchDone;
          showTutMessage('🌙 NOITE – Gerencie o bunker!');
        }
        updateCycleUI();
        updateBunkerStats();
      }

      // ===== TIMER UI =====
      updateCycleUI();

      // ===== JOGADOR (apenas dia) =====
      if (game.isDay && p.alive) {
        // Oxigênio e energia decaem
        p.oxygen -= dt * 1.6;
        p.energy -= dt * 0.5;
        if (p.oxygen <= 0) { p.oxygen = 0;
          p.health -= dt * 8; }
        if (p.energy <= 0) { p.energy = 0;
          p.health -= dt * 3; }
        if (p.health <= 0) {
          p.health = 0;
          p.alive = false;
          triggerGameOver('Você sucumbiu na superfície.');
          return;
        }

        // Invulnerabilidade
        if (p.invincible > 0) p.invincible -= dt;
        if (p.attackCooldown > 0) p.attackCooldown -= dt;

        // Movimento
        let dx = 0,
          dy = 0;
        if (keys['w'] || keys['arrowup']) dy = -1;
        if (keys['s'] || keys['arrowdown']) dy = 1;
        if (keys['a'] || keys['arrowleft']) dx = -1;
        if (keys['d'] || keys['arrowright']) dx = 1;
        if (dx !== 0 && dy !== 0) { dx *= 0.707;
          dy *= 0.707; }
        p.x += dx * p.speed * dt;
        p.y += dy * p.speed * dt;
        p.x = clamp(p.x, p.radius, WORLD_W - p.radius);
        p.y = clamp(p.y, p.radius, WORLD_H - p.radius);

        // Coleta
        for (const r of game.resources) {
          if (r.collected) continue;
          if (dist(p, r) < p.radius + r.radius) {
            r.collected = true;
            r.respawnTimer = 12 + rand(0, 15);
            const val = r.value || 1;
            if (r.type === 'metal') game.inventory.metal += val;
            else if (r.type === 'biomass') game.inventory.biomass += val;
            else if (r.type === 'tech') game.inventory.tech += val;
            updateInventoryUI();
            // Partícula
            for (let i = 0; i < 5; i++) {
              game.particles.push({
                x: r.x,
                y: r.y,
                vx: rand(-40, 40),
                vy: rand(-40, 40),
                life: 0.4 + Math.random() * 0.4,
                maxLife: 0.8,
                color: r.type === 'metal' ? '#b0b8c0' : r.type === 'biomass' ? '#60c080' : '#c0a060',
                size: rand(3, 6),
              });
            }
          }
        }

        // Ataque (espaço)
        if (keys[' '] && p.attackCooldown <= 0) {
          p.attackCooldown = 0.5;
          for (const m of game.mutants) {
            if (dist(p, m) < p.radius + m.radius + 30) {
              const dmg = 10;
              m.hp -= dmg;
              for (let i = 0; i < 8; i++) {
                game.particles.push({
                  x: m.x,
                  y: m.y,
                  vx: rand(-60, 60),
                  vy: rand(-60, 60),
                  life: 0.3 + Math.random() * 0.3,
                  maxLife: 0.6,
                  color: '#ff6040',
                  size: rand(2, 5),
                });
              }
              if (m.hp <= 0) {
                const idx = game.mutants.indexOf(m);
                if (idx > -1) game.mutants.splice(idx, 1);
                // Drop
                if (Math.random() < 0.4) { game.inventory.biomass += 1;
                  updateInventoryUI(); }
              }
            }
          }
        }

        // Mutantes perseguem
        for (const m of game.mutants) {
          const d = dist(p, m);
          if (d < 300) {
            m.state = 'chase';
            m.targetX = p.x;
            m.targetY = p.y;
          } else if (m.state === 'chase') {
            m.state = 'patrol';
            m.targetX = rand(80, WORLD_W - 80);
            m.targetY = rand(80, WORLD_H - 200);
          }
          if (m.state === 'chase') {
            const ang = Math.atan2(p.y - m.y, p.x - m.x);
            const spd = m.speed * (1 + game.cycleCount * 0.02);
            m.x += Math.cos(ang) * spd * dt;
            m.y += Math.sin(ang) * spd * dt;
            if (d < m.radius + p.radius + 4) {
              if (m.attackCooldown <= 0) {
                m.attackCooldown = 0.7;
                if (p.invincible <= 0) {
                  p.health -= m.damage;
                  p.invincible = 0.4;
                  if (p.health <= 0) {
                    p.health = 0;
                    p.alive = false;
                    triggerGameOver('Você foi morto por um mutante.');
                    return;
                  }
                }
              }
            }
          } else {
            if (dist(m, { x: m.targetX, y: m.targetY }) < 20) {
              m.targetX = rand(80, WORLD_W - 80);
              m.targetY = rand(80, WORLD_H - 200);
            }
            const ang = Math.atan2(m.targetY - m.y, m.targetX - m.x);
            m.x += Math.cos(ang) * m.speed * 0.4 * dt;
            m.y += Math.sin(ang) * m.speed * 0.4 * dt;
          }
          m.x = clamp(m.x, m.radius, WORLD_W - m.radius);
          m.y = clamp(m.y, m.radius, WORLD_H - m.radius);
          if (m.attackCooldown > 0) m.attackCooldown -= dt;
        }

        // UI do jogador
        hpBar.style.width = (p.health / 100 * 100) + '%';
        hpText.textContent = Math.floor(p.health);
        oxyBar.style.width = (p.oxygen / 100 * 100) + '%';
        oxyText.textContent = Math.floor(p.oxygen);
        engBar.style.width = (p.energy / 100 * 100) + '%';
        engText.textContent = Math.floor(p.energy);
      }

      // ===== BUNKER (sempre) =====
      const prod = game.bunker.prodO2;
      const cons = game.bunker.consEnergy;
      // Produz O₂ se tiver energia
      if (game.bunker.energy > 0) {
        game.bunker.oxygen = clamp(game.bunker.oxygen + prod * dt, 0, 100);
        game.bunker.energy = clamp(game.bunker.energy - cons * dt, 0, 100);
      } else {
        // Sem energia, O₂ cai lentamente
        game.bunker.oxygen = clamp(game.bunker.oxygen - dt * 0.3, 0, 100);
      }

      // Verifica vitória: O₂ > 95, researchDone, ciclo > 5
      if (game.bunker.oxygen > 95 && game.bunker.researchDone && game.cycleCount > 5) {
        triggerWin();
        return;
      }
      // Game over se bunker O₂ = 0
      if (game.bunker.oxygen <= 0) {
        triggerGameOver('O bunker ficou sem oxigênio.');
        return;
      }

      // Atualiza UI do bunker
      bunkerOxyBar.style.width = game.bunker.oxygen + '%';
      bunkerOxyText.textContent = Math.floor(game.bunker.oxygen);
      bunkerEngBar.style.width = game.bunker.energy + '%';
      bunkerEngText.textContent = Math.floor(game.bunker.energy);

      // ===== PARTÍCULAS =====
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const pt = game.particles[i];
        pt.x += pt.vx * dt;
        pt.y += pt.vy * dt;
        pt.life -= dt;
        if (pt.life <= 0) game.particles.splice(i, 1);
      }

      // ===== RECURSOS RESPAWN =====
      for (const r of game.resources) {
        if (r.collected) {
          r.respawnTimer -= dt;
          if (r.respawnTimer <= 0) {
            r.collected = false;
            r.respawnTimer = 0;
            r.x = rand(60, WORLD_W - 60);
            r.y = rand(60, WORLD_H - 60);
          }
        }
      }
    }

    // ---- RENDER ----
    function render() {
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      const scaleX = W / WORLD_W;
      const scaleY = H / WORLD_H;
      const scale = Math.min(scaleX, scaleY) * 0.9;
      const offX = (W - WORLD_W * scale) / 2;
      const offY = (H - WORLD_H * scale) / 2;

      function toScreen(wx, wy) {
        return [offX + wx * scale, offY + wy * scale];
      }

      // Fundo
      const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
      if (game.isDay) {
        grad.addColorStop(0, '#1a2a2a');
        grad.addColorStop(0.6, '#0e1a18');
        grad.addColorStop(1, '#060a0a');
      } else {
        grad.addColorStop(0, '#0a0e1a');
        grad.addColorStop(0.6, '#060810');
        grad.addColorStop(1, '#020408');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Zonas de perigo (leves)
      for (let i = 0; i < 8; i++) {
        const cx = (i * 187 + 30) % WORLD_W;
        const cy = (i * 311 + 20) % WORLD_H;
        const r = 100 + (i * 17) % 80;
        const [sx, sy] = toScreen(cx, cy);
        const grad2 = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * scale);
        const alpha = 0.03 + Math.sin(game.cycleTime * 0.2 + i) * 0.01 + 0.01;
        grad2.addColorStop(0, `rgba(200,80,60,${alpha})`);
        grad2.addColorStop(1, `rgba(200,80,60,0)`);
        ctx.fillStyle = grad2;
        ctx.beginPath();
        ctx.arc(sx, sy, r * scale, 0, Math.PI * 2);
        ctx.fill();
      }

      // Recursos
      for (const r of game.resources) {
        if (r.collected) continue;
        const [sx, sy] = toScreen(r.x, r.y);
        const sr = r.radius * scale;
        const color = r.type === 'metal' ? '#b0b8c0' : r.type === 'biomass' ? '#60c080' : '#c0a060';
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#00000044';
        ctx.font = `${sr * 0.8}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const sym = { metal: '⬡', biomass: '✦', tech: '⚙' };
        ctx.fillText(sym[r.type] || '•', sx, sy + 1);
        ctx.fillStyle = '#ffffffcc';
        ctx.fillText(sym[r.type] || '•', sx, sy);
      }

      // Mutantes
      for (const m of game.mutants) {
        const [sx, sy] = toScreen(m.x, m.y);
        const sr = m.radius * scale;
        ctx.shadowColor = '#ff4060';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#c04060';
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Olhos
        ctx.fillStyle = '#ff6040';
        ctx.beginPath();
        ctx.arc(sx - sr * 0.3, sy - sr * 0.2, sr * 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx + sr * 0.3, sy - sr * 0.2, sr * 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(sx - sr * 0.35, sy - sr * 0.2, sr * 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx + sr * 0.25, sy - sr * 0.2, sr * 0.08, 0, Math.PI * 2);
        ctx.fill();
        // HP
        const hpPct = m.hp / m.maxHp;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(sx - sr * 0.6, sy - sr - 6 * scale, sr * 1.2, 4 * scale);
        ctx.fillStyle = hpPct > 0.5 ? '#60c080' : '#e06040';
        ctx.fillRect(sx - sr * 0.6, sy - sr - 6 * scale, sr * 1.2 * hpPct, 4 * scale);
      }

      // Jogador (dia)
      if (game.isDay && game.player.alive) {
        const p = game.player;
        const [sx, sy] = toScreen(p.x, p.y);
        const sr = p.radius * scale;
        ctx.shadowColor = 'rgba(60,200,200,0.3)';
        ctx.shadowBlur = 20;
        // Capacete
        ctx.fillStyle = '#2a3a3a';
        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3a5a5a';
        ctx.beginPath();
        ctx.arc(sx, sy - sr * 0.2, sr * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#60d0d0';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(sx, sy - sr * 0.25, sr * 0.35, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#4ab0b0';
        ctx.beginPath();
        ctx.arc(sx - sr * 0.1, sy - sr * 0.3, sr * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3a9a9a';
        ctx.beginPath();
        ctx.arc(sx + sr * 0.08, sy - sr * 0.3, sr * 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#2a3a3a';
        ctx.fillRect(sx - sr * 0.4, sy + sr * 0.3, sr * 0.8, sr * 0.6);
        ctx.fillStyle = '#1a2a2a';
        ctx.fillRect(sx - sr * 0.35, sy + sr * 0.8, sr * 0.2, sr * 0.4);
        ctx.fillRect(sx + sr * 0.15, sy + sr * 0.8, sr * 0.2, sr * 0.4);
        if (p.invincible > 0) {
          ctx.strokeStyle = `rgba(255,200,100,${0.3 + Math.sin(p.invincible * 20) * 0.2})`;
          ctx.lineWidth = 3 * scale;
          ctx.beginPath();
          ctx.arc(sx, sy, sr * 1.3, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // Partículas
      for (const pt of game.particles) {
        const [sx, sy] = toScreen(pt.x, pt.y);
        const alpha = pt.life / pt.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = pt.color || '#fff';
        ctx.shadowBlur = 8;
        ctx.shadowColor = pt.color || '#fff';
        ctx.beginPath();
        ctx.arc(sx, sy, pt.size * scale * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;

      // Bunker
      const [bx, by] = toScreen(WORLD_W / 2, WORLD_H - 160);
      ctx.fillStyle = 'rgba(60,120,100,0.2)';
      ctx.beginPath();
      ctx.arc(bx, by, 35 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(60,180,140,0.5)';
      ctx.font = `${22 * scale}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🏛️', bx, by);
      ctx.fillStyle = '#4a8a7a';
      ctx.font = `${10 * scale}px sans-serif`;
      ctx.fillText('BUNKER', bx, by + 30 * scale);

      // Dicas dia
      if (game.isDay && game.player.alive) {
        ctx.fillStyle = 'rgba(200,220,200,0.12)';
        ctx.font = `${11 * scale}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('WASD mover | ESPAÇO atacar | Colete recursos', W / 2, H - 10);
      }
    }

    // ---- GAME LOOP ----
    let lastTime = 0;

    function loop(time) {
      const dt = Math.min((time - lastTime) / 1000, 0.05);
      lastTime = time;

      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    // ---- INICIALIZAÇÃO FINAL ----
    restartBtn.addEventListener('click', resetGame);

    // Iniciar
    initWorld();
    updateBunkerStats();
    updateInventoryUI();
    updateCycleUI();
    showTutorial(0);
    // Botões noturnos começam desabilitados
    btnPlant.disabled = true;
    btnUpgrade.disabled = true;
    btnResearch.disabled = true;

    // Iniciar loop
    requestAnimationFrame(loop);

    // Ajuste de tela
    window.addEventListener('resize', resizeCanvas);

    console.log('🌱 Ecosfera 2200 – Junior carregada!');
  </script>
